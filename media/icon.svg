  <line x1="64" y1="64" x2="96" y2="40" stroke="#4FC1FF" stroke-width="2" stroke-linecap="round"/>
  <line x1="64" y1="64" x2="32" y2="88" stroke="#4FC1FF" stroke-width="2" stroke-linecap="round"/>
  <line x1="64" y1="64" x2="96" y2="88" stroke="#4FC1FF" stroke-width="2" stroke-linecap="round"/>

  <!-- Outer nodes -->
  <circle cx="32" cy="40" r="8" fill="#4FC1FF" opacity="0.7"/>
  <circle cx="96" cy="40" r="8" fill="#4FC1FF" opacity="0.7"/>
  <circle cx="32" cy="88" r="8" fill="#4FC1FF" opacity="0.7"/>
